# DASFWI environment -- PORTABLE spec (works on Linux clusters and macOS).
#
# The science pins matter (numpy 1.24.4 / scipy 1.10.1 / obspy 1.4.1 ...):
# the misfit code was validated on exactly this stack (78-test suite).
#
# torch is NOT listed here -- install the build matching your platform AFTER
# creating the env (see hpc/condor/README.md section 3):
#   OrangeGrid / CUDA cluster:
#       pip install torch --index-url https://download.pytorch.org/whl/cu124
#   local macOS (the stack the code was developed on):
#       pip install torch==2.1.0
#
# Create + activate:
#   conda env create -f env.yml && conda activate dasfwi
name: dasfwi
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
